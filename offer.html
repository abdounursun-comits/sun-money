<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offers - Sun Money</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
}

.header{
  background:#111827;
  padding:25px;
  text-align:center;
}

.header h1{
  margin:0;
  color:#ff9800;
}

.header p{
  color:#aaa;
}

.container{
  padding:20px;
}

.offer{
  background:#1f2937;
  padding:20px;
  margin-bottom:15px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.offer h3{
  margin:0 0 10px;
}

.reward{
  color:#00ff88;
  font-size:18px;
  font-weight:bold;
}

.btn{
  background:#ff9800;
  color:black;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn:hover{
  background:#ffb74d;
}

.message{
  text-align:center;
  margin-top:40px;
  color:#aaa;
}
</style>

</head>

<body>

<div class="header">
<h1>🎯 Sun Money Offers</h1>
<p>Complete offers and earn rewards</p>
</div>


<div class="container" id="offers">
<div class="message">
Loading offers...
</div>
</div>


<script>

const API = "https://sun-money.onrender.com";


async function loadOffers(){

    const box = document.getElementById("offers");

    try{

        const response = await fetch(API + "/api/offers");


        if(!response.ok){
            throw new Error("Server error");
        }


        const offers = await response.json();


        box.innerHTML="";


        if(offers.length === 0){

            box.innerHTML = `
            <div class="message">
            No offers available right now.
            </div>
            `;

            return;
        }



        offers.forEach(o=>{

            box.innerHTML += `

            <div class="offer">

                <div>
                    <h3>${o.title}</h3>

                    <div class="reward">
                    Earn $${o.reward}
                    </div>
                </div>


                <button class="btn" onclick="startOffer(${o.id})">
                    Start
                </button>

            </div>

            `;

        });


    }
    catch(error){

        box.innerHTML = `
        <div class="message">
        Failed to load offers.
        </div>
        `;

        console.log(error);

    }

}



function startOffer(id){

    let user = localStorage.getItem("user");

    let email="";


    if(user){

        user = JSON.parse(user);
        email=user.email;

    }


    window.location.href =
    API + "/click/" + id +
    "?email=" + encodeURIComponent(email);

}



loadOffers();


</script>

</body>
</html>
