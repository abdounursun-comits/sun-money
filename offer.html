<!DOCTYPE html>
<html>
<head>
  <title>Offers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Offers 🎯</h1>
  <div id="list"></div>

</div>

<script>
const email = localStorage.getItem("email");

async function load(){
  const res = await fetch("/offers");
  const data = await res.json();

  list.innerHTML = data.map(o => `
    <div class="card">
      <h3>${o.title}</h3>
      <p>${o.description || ""}</p>
      <a href="/click/${o.id}?email=${email}">
        <button>Start Offer</button>
      </a>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
