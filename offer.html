<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sun Money Offers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.header{
    background:#111827;
    padding:20px;
    text-align:center;
}

.header h1{
    color:#ff9800;
}

.container{
    padding:20px;
}

.offer{
    background:#1f2937;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
}

.reward{
    color:#00ff88;
    font-size:18px;
    margin:10px 0;
}

button{
    background:#ff9800;
    border:0;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.error{
    background:#991b1b;
    padding:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="header">
<h1>🎯 Sun Money Offers</h1>
<p>Complete offers and earn rewards</p>
</div>


<div class="container" id="offers">
Loading offers...
</div>


<script>

const API="https://sun-money.onrender.com";


async function loadOffers(){

try{

const response = await fetch(API+"/api/offers");


console.log("STATUS:",response.status);


const data = await response.json();


console.log(data);



const box=document.getElementById("offers");

box.innerHTML="";


if(data.length===0){

box.innerHTML=
`
<div class="error">
No offers available now.
</div>
`;

return;

}



data.forEach(o=>{


box.innerHTML+=
`

<div class="offer">

<h2>${o.title}</h2>

<div class="reward">
$${o.reward} Reward
</div>


<button onclick="startOffer(${o.id})">
Start Offer
</button>


</div>


`;

});


}
catch(error){

console.log(error);


document.getElementById("offers").innerHTML=
`
<div class="error">
Failed to load offers.<br>
${error}
</div>
`;

}

}



function startOffer(id){

let user=JSON.parse(localStorage.getItem("user"));

let email="";


if(user){

email=user.email;

}


window.location.href=
API+"/click/"+id+"?email="+email;


}



loadOffers();


</script>


</body>
</html>
