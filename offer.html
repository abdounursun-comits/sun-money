<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sun Money Offers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://quge5.com/88/tag.min.js"
        data-zone="261846"
        async
        data-cfasync="false"></script>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    background:#111827;
    padding:20px;
    text-align:center;
}

.header h1{
    color:#ff9800;
    margin:0;
}

.container{
    padding:20px;
}

.offer{
    background:#1f2937;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
}

.offer h2{
    margin:0 0 10px;
}

.reward{
    color:#00ff88;
    font-size:18px;
    margin-bottom:15px;
}

button{
    background:#ff9800;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ffa726;
}

.message{
    background:#1f2937;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.error{
    background:#991b1b;
    padding:20px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="header">
    <h1>🎯 Sun Money Offers</h1>
    <p>Complete offers and earn rewards</p>
</div>


<div class="container" id="offers">
    <div class="message">
        Loading offers...
    </div>
</div>


<script>

const API = "https://sun-money.onrender.com";


async function loadOffers(){

    const box = document.getElementById("offers");


    try{

        const response = await fetch(API + "/api/offers");


        const data = await response.json();


        console.log("API RESPONSE:", data);



        if(!Array.isArray(data)){

            throw new Error(
                data.error || "Server did not return offers"
            );

        }



        if(data.length === 0){

            box.innerHTML = `
            <div class="message">
                No offers available now.
            </div>
            `;

            return;

        }



        box.innerHTML = "";



        data.forEach(offer=>{


            box.innerHTML += `

            <div class="offer">

                <h2>${offer.title}</h2>

                <div class="reward">
                    $${offer.reward} Reward
                </div>


                <button onclick="startOffer(${offer.id})">
                    Start Offer
                </button>

            </div>

            `;


        });


    }
    catch(error){

        console.error(error);


        box.innerHTML = `

        <div class="error">

            Failed to load offers.<br><br>

            ${error.message}

        </div>

        `;

    }

}



function startOffer(id){


    let user = localStorage.getItem("user");


    let email = "";


    if(user){

        try{

            email = JSON.parse(user).email || "";

        }
        catch(e){}

    }


    window.location.href =
    API + "/click/" + id + "?email=" + encodeURIComponent(email);


}



loadOffers();


</script>


</body>
</html>
