<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sun Money Admin</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

button {
    padding: 8px;
    margin: 3px;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

th {
    background: #eee;
}
</style>
</head>

<body>

<header>⚙️ Sun Money Admin Panel</header>

<div class="container">

<!-- STATS -->
<div class="card">
    <h3>📊 Dashboard</h3>
    <p>Users: <span id="users">0</span></p>
    <p>Clicks: <span id="clicks">0</span></p>
    <p>Total Balance: $<span id="balance">0</span></p>
</div>

<!-- USERS -->
<div class="card">
    <h3>👥 All Users</h3>
    <button onclick="loadUsers()">Refresh Users</button>
    <div id="usersTable"></div>
</div>

<!-- OFFERS -->
<div class="card">
    <h3>🎯 Offers</h3>

    <input id="title" placeholder="Title">
    <input id="url" placeholder="URL">
    <input id="reward" placeholder="Reward">

    <button onclick="createOffer()">Create Offer</button>

    <div id="offersTable"></div>
</div>

<!-- WITHDRAWALS -->
<div class="card">
    <h3>💰 Withdraw Requests</h3>
    <button onclick="loadWithdrawals()">Refresh Withdrawals</button>
    <div id="withdrawTable"></div>
</div>

</div>

<script>

const API = "https://sun-money.onrender.com";
const token = localStorage.getItem("admin_token");

if(!token){
    alert("Admin login required");
    window.location.href = "/auth.html";
}

// ================= STATS =================
async function loadStats(){
    const res = await fetch(API + "/admin/stats", {
        headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    document.getElementById("users").innerText = data.users;
    document.getElementById("clicks").innerText = data.clicks;
    document.getElementById("balance").innerText = data.balance;
}

// ================= USERS =================
async function loadUsers(){
    const res = await fetch(API + "/admin/users", {
        headers: { Authorization: "Bearer " + token }
    });

    const users = await res.json();

    let html = `<table>
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Balance</th>
    </tr>`;

    users.forEach(u => {
        html += `
        <tr>
            <td>${u.id}</td>
            <td>${u.email}</td>
            <td>$${u.balance}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById("usersTable").innerHTML = html;
}

// ================= OFFERS =================
async function createOffer(){
    const title = document.getElementById("title").value;
    const url = document.getElementById("url").value;
    const reward = document.getElementById("reward").value;

    await fetch(API + "/admin/offers", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
        },
        body: JSON.stringify({ title, url, reward })
    });

    loadOffers();
}

async function loadOffers(){
    const res = await fetch(API + "/admin/offers", {
        headers: { Authorization: "Bearer " + token }
    });

    const offers = await res.json();

    let html = `<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Reward</th>
        <th>Status</th>
        <th>Action</th>
    </tr>`;

    offers.forEach(o => {
        html += `
        <tr>
            <td>${o.id}</td>
            <td>${o.title}</td>
            <td>$${o.reward}</td>
            <td>${o.active}</td>
            <td>
                <button onclick="disableOffer(${o.id})">Disable</button>
                <button onclick="enableOffer(${o.id})">Enable</button>
                <button onclick="deleteOffer(${o.id})">Delete</button>
            </td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById("offersTable").innerHTML = html;
}

// offer actions
async function disableOffer(id){
    await fetch(API + "/admin/offers/" + id + "/disable", {
        method: "POST",
        headers: { Authorization: "Bearer " + token }
    });
    loadOffers();
}

async function enableOffer(id){
    await fetch(API + "/admin/offers/" + id + "/enable", {
        method: "POST",
        headers: { Authorization: "Bearer " + token }
    });
    loadOffers();
}

async function deleteOffer(id){
    await fetch(API + "/admin/offers/" + id, {
        method: "DELETE",
        headers: { Authorization: "Bearer " + token }
    });
    loadOffers();
}

// ================= WITHDRAWALS =================
async function loadWithdrawals(){
    const res = await fetch(API + "/admin/withdrawals", {
        headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    let html = `<table>
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Method</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Action</th>
    </tr>`;

    data.forEach(w => {
        html += `
        <tr>
            <td>${w.id}</td>
            <td>${w.email}</td>
            <td>${w.method}</td>
            <td>$${w.amount}</td>
            <td>${w.status}</td>
            <td>
                <button onclick="approve(${w.id})">Approve</button>
                <button onclick="reject(${w.id})">Reject</button>
            </td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById("withdrawTable").innerHTML = html;
}

// approve withdraw
async function approve(id){
    await fetch(API + "/admin/withdraw/approve", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
        },
        body: JSON.stringify({ id })
    });

    loadWithdrawals();
}

// reject withdraw
async function reject(id){
    await fetch(API + "/admin/withdraw/reject", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
        },
        body: JSON.stringify({ id })
    });

    loadWithdrawals();
}

// init
loadStats();
loadOffers();
loadUsers();
loadWithdrawals();

setInterval(loadStats, 5000);

</script>

</body>
</html>
