<script>

const API = "https://sun-money.onrender.com";

async function login(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    const res = await fetch(API + "/admin/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username,
            password
        })
    });

    const data = await res.json();

    if(data.token){

        localStorage.setItem(
            "adminToken",
            data.token
        );

        startAdmin();

    }else{
        alert("Login failed");
    }
}

function authHeader(){

    return {
        Authorization:
        "Bearer " +
        localStorage.getItem("adminToken")
    };
}

async function loadUsers(){

    const res = await fetch(
        API + "/admin/users",
        {
            headers:authHeader()
        }
    );

    const users = await res.json();

    let html = "";

    users.forEach(u => {

        html += `
        <tr>
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td>${u.email}</td>
            <td>${u.mobile}</td>
            <td>$${u.balance}</td>
        </tr>
        `;
    });

    document.getElementById("usersTable")
    .innerHTML = html;
}
