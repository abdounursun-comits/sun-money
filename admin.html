<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sun Money Admin</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px 20px;
cursor:pointer;
}
</style>

</head>
<body>

<div id="loginBox" class="card">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<div id="panel" style="display:none">

<div class="card">

<h2>Dashboard</h2>

<p>Users: <span id="users">0</span></p>

<p>Offers: <span id="offers">0</span></p>

<p>Withdrawals: <span id="withdrawals">0</span></p>

<p>Total Balance: $<span id="balance">0</span></p>

</div>

<div class="card">

<h2>Users</h2>

<div id="userList"></div>

</div>

<div class="card">

<h2>Withdrawals</h2>

<div id="withdrawList"></div>

</div>

</div>

<script>

const API =
"https://sun-money.onrender.com";

async function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

const res = await fetch(
API + "/admin/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password
})
}
);

const data =
await res.json();

if(data.token){

localStorage.setItem(
"adminToken",
data.token
);

document.getElementById(
"loginBox"
).style.display="none";

document.getElementById(
"panel"
).style.display="block";

loadDashboard();

}else{

alert("Login failed");

}

}

async function loadDashboard(){

const token =
localStorage.getItem(
"adminToken"
);

const dash =
await fetch(
API + "/admin/dashboard",
{
headers:{
Authorization:
"Bearer " + token
}
}
);

const d =
await dash.json();

document.getElementById(
"users"
).innerText = d.users;

document.getElementById(
"offers"
).innerText = d.offers;

document.getElementById(
"withdrawals"
).innerText =
d.withdrawals;

document.getElementById(
"balance"
).innerText =
d.balance;

loadUsers();

loadWithdrawals();

}

async function loadUsers(){

const token =
localStorage.getItem(
"adminToken"
);

const res =
await fetch(
API + "/admin/users",
{
headers:{
Authorization:
"Bearer " + token
}
}
);

const users =
await res.json();

let html = "";

users.forEach(u=>{

html += `
<div>
${u.id}
-
${u.username}
-
${u.email}
-
$${u.balance}
</div>
`;

});

document.getElementById(
"userList"
).innerHTML = html;

}

async function loadWithdrawals(){

const token =
localStorage.getItem(
"adminToken"
);

const res =
await fetch(
API + "/admin/withdrawals",
{
headers:{
Authorization:
"Bearer " + token
}
}
);

const rows =
await res.json();

let html = "";

rows.forEach(w=>{

html += `
<div style="margin-bottom:10px">

#${w.id}
-
${w.email}
-
$${w.amount}
-
${w.status}

</div>
`;

});

document.getElementById(
"withdrawList"
).innerHTML = html;

}

</script>

</body>
</html>
