<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sun Money Auth</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:350px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:1px solid #ddd;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#ff9800;
    border:none;
    color:white;
    cursor:pointer;
    margin-top:10px;
    border-radius:5px;
}

button:hover{
    opacity:0.9;
}

.switch{
    text-align:center;
    margin-top:10px;
    color:blue;
    cursor:pointer;
}

.hidden{
    display:none;
}

.msg{
    text-align:center;
    color:red;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

    <!-- LOGIN -->
    <div id="loginBox">
        <h2>Login</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()">Login</button>

        <p class="msg" id="loginMsg"></p>

        <div class="switch" onclick="showRegister()">
            Don't have an account? Register
        </div>
    </div>

    <!-- REGISTER -->
    <div id="registerBox" class="hidden">
        <h2>Register</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="mobil" placeholder="Mobile Number">
        <input type="password" id="password" placeholder="Password">

        <button onclick="register()">Register</button>

        <p class="msg" id="regMsg"></p>

        <div class="switch" onclick="showLogin()">
            Already have an account? Login
        </div>
    </div>

</div>

<script>

const API = "https://sun-money.onrender.com";

// SWITCH
function showRegister(){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
}

// REGISTER
async function register(){

    try{

        const res = await fetch(API + "/register",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:document.getElementById("username").value,
                email:document.getElementById("email").value,
                mobile:document.getElementById("mobil").value,
                password:document.getElementById("password").value
            })
        });

        const data = await res.json();

        if(data.success){
            document.getElementById("regMsg").style.color = "green";
            document.getElementById("regMsg").innerText =
                "Registration successful. Please login.";

            setTimeout(()=>{
                showLogin();
            },1000);

        }else{
            document.getElementById("regMsg").style.color = "red";
            document.getElementById("regMsg").innerText =
                data.message || "Registration failed";
        }

    }catch(err){
        document.getElementById("regMsg").innerText =
            "Cannot connect to server";
    }
}

// LOGIN
async function login(){

    try{

        const res = await fetch(API + "/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email:document.getElementById("loginEmail").value,
                password:document.getElementById("loginPassword").value
            })
        });

        const data = await res.json();

        if(!data.success){
            document.getElementById("loginMsg").innerText =
                data.message || "Login failed";
            return;
        }

        localStorage.setItem("token", data.token);

        window.location.href = "dashboard.html";

    }catch(err){

        document.getElementById("loginMsg").innerText =
            "Cannot connect to server";
    }
}

</script>

</body>
</html>
