<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Withdraw - Sun Money</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:20px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#ff9800;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    opacity:.9;
}

.msg{
    margin-top:10px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="box">

<h2>💸 Withdraw Funds</h2>

<p>
Current User:
<b id="userEmail"></b>
</p>

<select id="method">
    <option value="Mobile Money">
        Mobile Money
    </option>

    <option value="Bank Account">
        Bank Account
    </option>
</select>

<input
    type="text"
    id="account"
    placeholder="Phone Number or Bank Account"
/>

<input
    type="number"
    id="amount"
    placeholder="Amount"
/>

<button onclick="withdrawMoney()">
Request Withdrawal
</button>

<p class="msg" id="msg"></p>

<br>

<a href="dashboard.html">
← Back Dashboard
</a>

</div>

<script>

const token = localStorage.getItem("token");
const email = localStorage.getItem("email");

if(!token){
    window.location.href="auth.html";
}

document.getElementById("userEmail").innerText =
    email || "Unknown";

async function withdrawMoney(){

    const method =
        document.getElementById("method").value;

    const account =
        document.getElementById("account").value;

    const amount =
        document.getElementById("amount").value;

    const res = await fetch(
        "https://sun-money.onrender.com",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },
            body:JSON.stringify({
                method,
                account,
                amount
            })
        }
    );

    const data = await res.json();

    document.getElementById("msg").innerText =
        data.message || "Withdrawal submitted";
}

</script>

</body>
</html>
